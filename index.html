<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>p5MediaPipe Hand Gesture Recognition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .gesture-reference-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
    }

    @media (min-width: 992px) {
      .gesture-panel {
        max-width: 100%;
      }
    }
  </style>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
  <div class="container-sm">
    <div class="row mb-2">
      <div class="col-12 text-center">
        <h1 class="display-1 mt-5 mb-4">
          Gesture Typing
        </h1>
        <button id="button_webcam" disabled onclick="startWebcam();" class="btn btn-primary mb-2">
          Model Loading...
        </button>
      </div>
    </div>
    <div class="row align-items-start g-3 gesture-panel">
      <div class="col-12 col-lg-6 text-center">
        <img src="./handsign.png" alt="Gesture typing key map" class="gesture-reference-image img-fluid rounded border bg-white shadow-sm">
      </div>
      <div class="col-12 col-lg-6 text-center">
        <div id="canvas"></div>
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-12 text-center">
        <div class="card mt-2">
          <div class="card-header">
            <h5 class="card-title">
            </h5>
            <h5 id="message" class="card-subtitle mb-2 fw-bold">
              Press the start button to begin the challenge
            </h5>
          </div>
          <div class="card-body">
            <input type="text" style="font-size:1.5em; padding:0.5em;" class="form-control" value="">
          </div>

        </div>
      </div>



    <!-- include js libraries -->
    <script src=" ./js/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="./js/hands.js" crossorigin="anonymous"></script>
    <script src="./js/p5.js"></script>
    <script src="./js/sketch.js"></script>
    <script type="module" src="./js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMvJHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"></script>

</body>
</html>
